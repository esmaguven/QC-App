<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC App</title>
    <link rel="stylesheet" href="css/design-tokens.css">
    <meta name="theme-color" content="#001a4d">
</head>
<body>
    <header>
        <h1>Welcome to QC App</h1>
    </header>
    <main>
        <section class="error-message" style="background-color: #faf4f2;">
            <p>Error: Please check your inputs.</p>
        </section>
        <section class="success-message" style="background-color: #7fb3a0;">
            <p>Success: Your operation was successful!</p>
        </section>
        <section class="warning-message" style="background-color: #d4a574;">
            <p>Warning: Please pay attention to this message.</p>
        </section>
        <button class="btn btn-success-muted" aria-label="Confirm operation">Confirm</button>
        <button class="btn btn-warning" aria-label="Cancel operation">Cancel</button>
    </main>
    <footer>
        <p>© 2026 QC App</p>
    </footer>
</body>
</html>
